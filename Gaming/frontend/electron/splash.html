<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mission Control - Initializing</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #09090b; /* zinc-950 */
      color: #76b900; /* neon-green */
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      -webkit-app-region: drag; /* allows dragging window */
    }
    
    .logo-container {
      position: relative;
      width: 120px;
      height: 120px;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pulse-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid rgba(118, 185, 0, 0.2);
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    .spin-ring {
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      border: 1px dashed rgba(118, 185, 0, 0.4);
      animation: spin 10s linear infinite;
    }

    .logo {
      width: 60px;
      height: 60px;
      background: rgba(118, 185, 0, 0.1);
      border: 1px solid rgba(118, 185, 0, 0.3);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px rgba(118, 185, 0, 0.2);
      animation: pulse-glow 2s ease-in-out infinite alternate;
    }

    .logo-text {
      text-transform: uppercase;
      letter-spacing: 0.3em;
      font-size: 14px;
      font-weight: 900;
      color: white;
      margin-bottom: 8px;
    }

    .sub-text {
      text-transform: uppercase;
      letter-spacing: 0.2em;
      font-size: 10px;
      font-weight: 700;
      color: #71717a; /* zinc-500 */
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: .5; transform: scale(1.05); }
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    @keyframes pulse-glow {
      from { box-shadow: 0 0 10px rgba(118, 185, 0, 0.1); }
      to { box-shadow: 0 0 40px rgba(118, 185, 0, 0.4); }
    }
  </style>
</head>
<body>
  
  <div class="logo-container">
    <div class="pulse-ring"></div>
    <div class="spin-ring"></div>
    <div class="logo">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="6" width="20" height="12" rx="2" ry="2"></rect>
        <path d="M12 12h.01"></path>
        <path d="M17 12h.01"></path>
        <path d="M7 12h.01"></path>
      </svg>
    </div>
  </div>
  
  <div class="logo-text">Mission <span style="color: #76b900">Control</span></div>
  <div class="sub-text">Initializing core systems...</div>

</body>
</html>
