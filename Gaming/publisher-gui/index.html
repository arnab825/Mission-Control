<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Publisher Control</title>
    <style>
      /* Drag region for custom titlebar */
      .titlebar {
        -webkit-app-region: drag;
        height: 30px;
        width: 100%;
        position: fixed;
        top: 0;
        left: 0;
        z-index: 9999;
      }
      /* Prevent dragging on interactive elements */
      button, input, select, textarea {
        -webkit-app-region: no-drag;
      }
    </style>
  </head>
  <body class="bg-obsidian text-zinc-100 flex flex-col h-screen w-screen overflow-hidden m-0 p-0">
    <div class="titlebar"></div>
    <!-- Title Bar -->
    <div class="h-8 flex justify-between items-center px-3 no-drag opacity-70 hover:opacity-100 transition-opacity">
      <div class="text-[11px] font-semibold tracking-wider text-neon-green/80 uppercase">Publisher V2</div>
      <button id="close-btn" class="w-6 h-6 flex items-center justify-center rounded hover:bg-white/10 text-zinc-400 hover:text-white transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>
    </div>

    <!-- Main Content -->
    <div class="flex-1 p-8 overflow-y-auto no-drag relative z-10">
      
      <!-- Header -->
      <div class="max-w-xl mx-auto w-full">
        <div class="mb-8">
          <div class="flex items-center gap-3 mb-2">
            <h1 class="text-3xl font-bold text-white tracking-tight">New Release</h1>
            <span id="currentVersionBadge" class="bg-zinc-800/80 text-zinc-400 border border-zinc-700/50 text-[10px] font-mono font-bold px-2 py-0.5 rounded tracking-wider mt-1.5">v...</span>
          </div>
          <p class="text-zinc-400 text-sm">Deploy changes directly to Mission Control.</p>
        </div>

        <!-- Form -->
        <form id="publishForm" class="flex flex-col gap-5 space-y-2">
        
        <!-- Title Field -->
        <div class="flex flex-col gap-1.5">
          <div class="flex justify-between items-center">
            <label for="title" class="text-sm font-semibold text-zinc-300">Release Title <span class="text-neon-green">*</span></label>
            <button type="button" id="autoGenTitleBtn" class="text-[11px] text-neon-green/80 hover:text-neon-green hover:underline font-semibold transition-colors uppercase tracking-wider">✨ Auto-generate</button>
          </div>
          <div class="relative">
            <input type="text" id="title" class="input-field !pl-11" placeholder="e.g. Added a new GUI feature">
            <div class="absolute left-3.5 top-3 text-neon-green/60">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
            </div>
          </div>
        </div>

        <!-- Type Field -->
        <div class="flex flex-col gap-1.5">
          <div class="flex justify-between items-center">
            <label for="type" class="text-sm font-semibold text-zinc-300">Update Type</label>
            <span class="text-xs text-zinc-500 font-mono">Target: <span id="targetVersionDisplay" class="text-neon-green font-bold">v...</span></span>
          </div>
          <div class="relative">
            <select id="type" class="input-field appearance-none cursor-pointer">
              <option value="patch" class="bg-obsidian text-zinc-100 py-1">Patch (Bug fixes, small tweaks)</option>
              <option value="minor" class="bg-obsidian text-zinc-100 py-1">Minor (New features)</option>
              <option value="major" class="bg-obsidian text-zinc-100 py-1">Major (Breaking changes)</option>
            </select>
            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-neon-green/60">
              <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
            </div>
          </div>
        </div>

        <div class="flex flex-col gap-1.5">
          <div class="flex justify-between items-center">
            <label for="changes" class="text-sm font-semibold text-zinc-300">Changelog <span class="text-zinc-500 font-normal">(One item per line)</span></label>
            <button type="button" id="autoGenChangesBtn" class="text-[11px] text-neon-green/80 hover:text-neon-green hover:underline font-semibold transition-colors uppercase tracking-wider">✨ Auto-generate</button>
          </div>
          <textarea id="changes" rows="4" class="input-field resize-none" placeholder="- Fixed issue with login...&#10;- Improved UI responsiveness..."></textarea>
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-semibold text-zinc-300">Preview Image <span class="text-zinc-500 font-normal">(Optional)</span></label>
          <div id="dropZone" class="relative border-2 border-dashed border-zinc-700 rounded-lg p-6 flex flex-col items-center justify-center text-center cursor-pointer hover:border-neon-green/50 hover:bg-neon-green/5 transition-all group">
            <svg class="w-8 h-8 text-zinc-500 mb-2 group-hover:text-neon-green/80 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
            </svg>
            <span class="text-sm text-zinc-400 group-hover:text-zinc-300 transition-colors">Drag & drop an image here, or click to select</span>
            <span id="fileNameDisplay" class="text-xs text-neon-green mt-2 hidden break-all"></span>
            <input type="file" id="imageFile" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
          </div>
        </div>

        <!-- Previous Release Info -->
        <div class="border-t border-zinc-800/50 pt-4 mt-2">
          <h3 class="text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-2">Latest Launched Release</h3>
          <div class="bg-zinc-900/40 border border-zinc-850/60 rounded-lg p-4 font-sans text-xs">
            <div class="flex justify-between items-center mb-1.5">
              <span id="prevVer" class="text-neon-green font-mono font-bold text-[13px]">...</span>
              <span id="prevDate" class="text-zinc-500 text-[10px]">...</span>
            </div>
            <h4 id="prevTitle" class="text-white font-semibold mb-2">...</h4>
            <ul id="prevHighlights" class="space-y-1 text-zinc-400 list-disc pl-4 max-h-24 overflow-y-auto">
              <!-- Dynamically populated -->
            </ul>
          </div>
        </div>

        <!-- Status Box -->
        <div id="statusBox" class="hidden rounded-lg p-3 text-sm mt-2"></div>

        <div class="flex justify-end gap-3 mt-2 pt-4 border-t border-zinc-800/50">
          <button type="button" id="cancelBtn" class="btn-secondary">Cancel</button>
          <button type="submit" id="publishBtn" class="btn-primary flex items-center justify-center gap-2">
            <span id="publishText">Publish Now</span>
            <svg id="publishSpinner" class="hidden animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
          </button>
        </form>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
